short_description: >
  Market entry analysis of 8,199 Play Store apps using Opportunity Score (installs per app per category)
  and K-Means segmentation across 5 normalised features — Mass Market Free holds over 60% of all apps.

full_description: |
  This project tackles a concrete market entry question: given 8,199 Android apps across the Google
  Play Store, which categories are undersupplied relative to demand, where do paid apps generate
  meaningful revenue, and what distinct product positions exist in the market? The dataset covers app
  name, category, rating, review count, size, install count, price, content rating, and genres. The
  analysis runs in three parts: an Opportunity Score that ranks categories by total installs divided
  by number of competing apps, a paid viability analysis filtered to apps priced at $29.99 or below
  with at least 10 paid apps per category, and a K-Means segmentation of individual apps using
  normalised features across installs, ratings, reviews, price, and size.

  The Opportunity Score surfaces categories where demand exceeds supply — high aggregate install
  volume with relatively few competing apps. Categories at the bottom of the ranking have the inverse
  profile: dense competition with proportionally modest install volume, making differentiation the
  primary challenge for any new entrant. Each category is classified as Opportunity (top quartile),
  Competitive, or Saturated (bottom quartile) based on percentile thresholds. The paid viability
  analysis confirms that most categories default to free-with-ads as the commercially rational model;
  only professional tools and niche productivity categories sustain median revenue estimates high enough
  to justify a paid price point.

  K-Means with k=4 on StandardScaler-normalised features produces four structurally distinct segments:
  Mass Market Free (high installs, free, broad categories — the dominant cluster by app count), Premium
  Paid (low installs, above-average price, high rating — niche professional audience), Hidden Gems
  (moderate installs, above-average rating, low review count — under-discovered quality apps), and
  Struggling (low installs, below-average rating). PCA reduces the five-dimensional feature space to
  two interpretable components, with PC1 driven by install and review volume and PC2 by rating and
  price. The four clusters are visually separable in PCA space, validating the k=4 choice. For a new
  developer, Mass Market Free is the recommended entry segment: it offers the highest install potential
  with zero price friction, while Premium Paid requires an established reputation or a niche with
  proven willingness to pay.

problem: |
  Raw app store data does not tell you where to launch or what type of app to build. Category rankings
  show volume but not opportunity — a category with 500 million total installs and 2,000 competing apps
  offers far less per-app upside than one with 200 million installs and 50 apps. Revenue data is polluted
  by junk listings priced at $200–250 with zero installs, making median estimates meaningless without a
  principled filter. Most critically, individual apps carry no market position label — there is no column
  that says whether an app is a mass-market free product, a premium niche tool, an undiscovered quality
  app, or a struggling low-engagement entry. That structure only becomes visible through analysis, and
  without it a developer cannot make an informed decision about category, pricing model, or competitive
  positioning.

solution: |
  Three complementary analytical layers address the market intelligence gap. First, Opportunity Score
  (total installs / number of apps per category) converts raw volume data into a demand-to-supply ratio,
  making the undersupplied categories immediately identifiable without requiring external benchmarks.
  Categories are then labelled Opportunity, Competitive, or Saturated using p75 and p25 thresholds.
  Second, a paid viability analysis filters to apps priced at $29.99 or below (a principled ceiling
  that removes data-entry junk without discarding legitimate paid apps) and requires a minimum of 10
  paid apps per category before computing median revenue estimates and median prices — ensuring the
  ranked output reflects actual market behaviour rather than outlier noise. Third, KMeans with k=4 is
  applied to a StandardScaler-normalised matrix of five features — log(Installs+1), Rating,
  log(Reviews+1), Price, and Size_MBs — clustering all 8,199 individual apps into four market positions.
  Log transforms on installs and reviews are required to reduce right skew before normalisation.
  PCA(n_components=2) is then applied to the scaled feature matrix to produce a two-dimensional
  projection with explained variance percentages on each axis, making the cluster structure visually
  interpretable.

challenges: |
  Three genuine data and modelling challenges shaped the approach. First, both Installs and Price arrive
  as strings: Installs contains comma separators (e.g. "10,000+") and Price contains dollar signs
  (e.g. "$2.99"). Neither column can be used numerically without a type conversion pipeline — stripping
  the formatting characters then casting with pd.to_numeric(). This must happen before any aggregation,
  filtering, or revenue calculation. Second, revenue estimates (Price × Installs) are heavily skewed by
  junk apps listed at $200–250 that have never been installed. A $250 blanket cap removes these but also
  discards some legitimate high-price professional apps. A $29.99 ceiling was chosen as a principled
  alternative — it eliminates the junk tier while retaining the realistic upper end of the paid app
  market, producing median estimates by category that reflect actual purchase behaviour. Third, K-Means
  on the raw feature matrix produces clusters dominated entirely by install count: an app with 1 billion
  installs is orders of magnitude from one with 1,000, so rating and price become invisible to the
  algorithm. Log transformation of installs and reviews reduces the skew, and StandardScaler
  normalisation ensures all five features contribute to cluster assignment. Without both steps, the
  four clusters collapse into one giant low-install group and a few extreme outliers — not a useful
  market segmentation.

